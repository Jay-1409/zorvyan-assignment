server.port=8081

spring.application.name=user-service
spring.datasource.url=${DB_URL:jdbc:oracle:thin:@localhost:1521/XEPDB1}
spring.datasource.username=${DB_USERNAME:app_user}
spring.datasource.password=${DB_PASSWORD:app_pass}
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.OracleDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

management.endpoints.web.exposure.include=health,info

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

app.jwt.secret=${JWT_SECRET:zaKEFxDMYfquYbjluaBin3vUbzLCNMF0h21Ri3++L1M=}
app.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:120}
app.security.login-rate-limit.max-requests=${LOGIN_RATE_LIMIT_MAX_REQUESTS:20}
app.security.login-rate-limit.window-seconds=${LOGIN_RATE_LIMIT_WINDOW_SECONDS:60}
